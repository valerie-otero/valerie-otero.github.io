<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#120d35"/>
      <stop offset="100%" stop-color="#06030f"/>
    </radialGradient>
    <radialGradient id="cg" cx="50%" cy="50%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1.0"/>
      <stop offset="60%" stop-color="#e879f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <clipPath id="ios-clip">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ios-clip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <circle cx="512" cy="512" r="420" fill="none" stroke="#7b5fff" stroke-width="5" opacity="0.7" filter="url(#glow)"/>
    <circle cx="512" cy="512" r="420" fill="none" stroke="#9b7fff" stroke-width="2" opacity="0.9"/>
    <circle cx="512" cy="512" r="340" fill="none" stroke="#8b6fff" stroke-width="6" opacity="0.75" filter="url(#glow)"/>
    <circle cx="512" cy="512" r="340" fill="none" stroke="#a68fff" stroke-width="2.5" opacity="0.95"/>
    <circle cx="512" cy="512" r="265" fill="none" stroke="#a855f7" stroke-width="7" opacity="0.80" filter="url(#glow)"/>
    <circle cx="512" cy="512" r="265" fill="none" stroke="#c490ff" stroke-width="3" opacity="1.0"/>
    <circle cx="512" cy="512" r="195" fill="none" stroke="#c026d3" stroke-width="8" opacity="0.82" filter="url(#glow)"/>
    <circle cx="512" cy="512" r="195" fill="none" stroke="#e040fb" stroke-width="3.5" opacity="1.0"/>
    <circle cx="512" cy="512" r="130" fill="none" stroke="#d500f9" stroke-width="9" opacity="0.85" filter="url(#glow)"/>
    <circle cx="512" cy="512" r="130" fill="none" stroke="#f050ff" stroke-width="4" opacity="1.0"/>
    <circle cx="512" cy="512" r="72"  fill="none" stroke="#e91e8c" stroke-width="10" opacity="0.88" filter="url(#glow)"/>
    <circle cx="512" cy="512" r="72"  fill="none" stroke="#ff4db8" stroke-width="4.5" opacity="1.0"/>
    <circle cx="512" cy="512" r="38" fill="url(#cg)"/>
    <circle cx="512" cy="512" r="7"  fill="#ffffff" opacity="1.0"/>
  </g>
</svg>
